# ============================================================================
# nav_params.yaml
# TurtleBot3 Waffle Pi 자율주행 파라미터 설정
# ============================================================================

# ── AMCL 파라미터 ─────────────────────────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time: true

    # 파티클 수 (많을수록 정확하지만 느림)
    min_particles: 500
    max_particles: 2000

    # 운동 모델 (differential)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2    # 회전에 의한 회전 노이즈
    alpha2: 0.2    # 병진에 의한 회전 노이즈
    alpha3: 0.2    # 병진에 의한 병진 노이즈
    alpha4: 0.2    # 회전에 의한 병진 노이즈
    alpha5: 0.2    # (omni 전용)

    # 센서 모델
    laser_model_type: "likelihood_field"
    laser_max_range: 3.5       # Waffle Pi LiDAR 최대 거리
    laser_min_range: 0.12
    max_beams: 60
    z_hit:    0.5
    z_short:  0.05
    z_max:    0.05
    z_rand:   0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    likelihood_field_dsmax: 2.0

    # 업데이트 조건
    update_min_d: 0.25         # 이 거리 이상 이동 시 파티클 업데이트
    update_min_a: 0.524        # 이 각도(30°) 이상 회전 시 파티클 업데이트
    resample_interval: 1

    # 재샘플링
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    pf_err: 0.05
    pf_z:   0.99

    # 초기 위치 (map 원점 기준)
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0
    initial_cov_xx: 0.25
    initial_cov_yy: 0.25
    initial_cov_aa: 0.0685

    # TF
    base_frame_id:  "base_footprint"
    odom_frame_id:  "odom"
    global_frame_id: "map"
    transform_tolerance: 0.5
    tf_broadcast: true

    # scan 토픽
    scan_topic: "scan"

    # 기타
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

# ── map_server 파라미터 ────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""           # launch 파일에서 오버라이드

# ── lifecycle_manager 파라미터 ─────────────────────────────────────────────────
lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - map_server
      - amcl
    bond_timeout: 4.0
    attempt_respawn_reconnect_timeout: 2000.0
    shutdown_on_failure: false

# ── Global Planner 파라미터 ────────────────────────────────────────────────────
global_planner:
  ros__parameters:
    use_sim_time:     true
    inflation_radius: 0.35    # 장애물 팽창 반경 (m) – 로봇 반경(0.22m) 보다 크게
    lethal_cost:      90       # 이 비용 이상은 장애물
    path_frame_id:    "map"
    waypoint_spacing: 0.10     # 최소 경로 포인트 간격 (m)

# ── Local Controller 파라미터 ──────────────────────────────────────────────────
local_controller:
  ros__parameters:
    use_sim_time:    true
    max_linear_vel:  0.2      # m/s  (Waffle Pi 최대 0.26)
    max_angular_vel: 1.50      # rad/s
    lookahead_dist:  0.30      # m  Pure Pursuit lookahead
    goal_tolerance:  0.15      # m  목표 도달 판정 거리
    danger_dist:     0.18    # m  즉시 정지 거리
    slow_dist:       0.25     # m  감속 시작 거리
    control_freq:    20.0      # Hz
    robot_frame:     "base_footprint"
    map_frame:       "map"

# ── Goal Manager 파라미터 ──────────────────────────────────────────────────────
goal_manager:
  ros__parameters:
    use_sim_time:       true
    goal_timeout:       60.0   # 초 – 이 시간 안에 도달 못하면 타임아웃
    loop_waypoints:     false  # 웨이포인트 반복 주행
    waypoint_file:      ""     # JSON 웨이포인트 파일 경로 (선택)
    reached_tolerance:  0.20   # m
